{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold mb-6"><i class="fas fa-plus-circle"></i> Add Disciplinary Record</h2>
    
    <form method="POST">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Student Name *</label>
            <input type="text" name="student_name" placeholder="Full Name" 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Class</label>
            <input type="text" name="student_class" placeholder="e.g., JSS 3A" 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium mb-1">Offense Details *</label>
            <textarea name="offense" rows="4" placeholder="Describe the offense..." 
                      class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required></textarea>
        </div>
        <div class="flex gap-4">
            <button type="submit" class="flex-1 bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 transition">
                <i class="fas fa-save"></i> Submit
            </button>
            <a href="{{ url_for('dashboard') }}" class="flex-1 bg-gray-300 text-gray-700 p-3 rounded-lg hover:bg-gray-400 transition text-center">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg mt-10">
    <div class="text-center mb-6">
        <i class="fas fa-shield-alt text-4xl text-indigo-600"></i>
        <h2 class="text-2xl font-bold mt-2">Login</h2>
        <p class="text-gray-500 text-sm">Enter your credentials</p>
    </div>
    
    <form method="POST">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Username</label>
            <input type="text" name="username" placeholder="e.g., admin" 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required>
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium mb-1">Password</label>
            <input type="password" name="password" placeholder="••••••" 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" required>
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 transition">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </form>
    
    <div class="mt-6 p-4 bg-gray-50 rounded-lg text-sm text-gray-600">
        <p class="font-medium mb-2">Demo Credentials:</p>
        <p><strong>Admin:</strong> admin / admin123</p>
        <p><strong>Teacher:</strong> teacher1 / teacher123</p>
    </div>
</div>
{% endblock %}
